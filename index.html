<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קניית רכב | דוח היסטוריה מקיף</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&family=Rubik:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">קניית רכב בטוחה</div>
        <ul style="padding: 0;">
            <li><a href="#">בית</a></li>
            <li><a href="#">אודות</a></li>
            <li><a href="#">צור קשר</a></li>
        </ul>
    </nav>

    <main>
        <section class="hero">
            <h1>בדוק את הרכב לפני שאתה קונה</h1>
            <p>קבל דוח היסטוריה מקיף, אמין ומדויק לכל רכב בישראל לפי מספר רישוי או VIN.</p>
            <div class="search-box">
                <input type="text" id="vinInput" placeholder="הזן מספר רישוי/VIN כאן..." aria-label="הזנת מספר רכב">
                <button onclick="searchVehicle()">חפש רכב</button>
            </div>
            <div id="resultArea" class="result-container"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
